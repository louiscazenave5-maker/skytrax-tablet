<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BM Tablet</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0b0b;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

/* TABLETTE */

.tablette{
    position:relative;
    width:1200px;
    height:760px;
    aspect-ratio:16/10;

    border-radius:42px;

    background:
    linear-gradient(145deg,#2a2a2a,#111);

    padding:10px;

    border:2px solid rgba(255,255,255,0.35);

    box-shadow:
    0 0 80px rgba(0,0,0,0.8),
    0 0 18px rgba(255,255,255,0.12),
    inset 0 0 5px rgba(255,255,255,0.12);

    overflow:visible;
}

/* CONTOUR BLANC PREMIUM */

.tablette::before{
    content:"";
    position:absolute;
    inset:-3px;

    border-radius:45px;

    border:2px solid rgba(255,255,255,0.45);

    pointer-events:none;

    box-shadow:
    0 0 12px rgba(255,255,255,0.18),
    inset 0 0 10px rgba(255,255,255,0.08);
}

/* PETIT BOUTON LATÉRAL */

.tablette::after{
    content:"";
    position:absolute;

    left:-8px;
    top:175px;

    width:8px;
    height:90px;

    border-radius:12px 0 0 12px;

    background:
    linear-gradient(
        to bottom,
        #e6e6e6,
        #7c7c7c,
        #d6d6d6
    );

    box-shadow:
    0 0 6px rgba(255,255,255,0.3),
    inset 0 0 3px rgba(0,0,0,0.45);
}

/* ECRAN */

.screen{
    position:relative;
    width:100%;
    height:100%;

    border-radius:34px;

    overflow:hidden;

    background:
    radial-gradient(circle at top left,#2d1f52,#0d0b17 70%);

    color:white;

    box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.1),
    inset 0 0 25px rgba(0,0,0,0.45);
}

/* CAMERA */

.camera{
    position:absolute;
    top:14px;
    left:50%;
    transform:translateX(-50%);

    width:90px;
    height:18px;

    border-radius:30px;

    background:#090909;

    z-index:100;

    display:flex;
    justify-content:center;
    align-items:center;
}

.camera::before{
    content:"";

    width:10px;
    height:10px;

    border-radius:50%;

    background:#1f1f1f;

    box-shadow:
    inset 0 0 4px rgba(255,255,255,0.15);
}

/* STATUS BAR */

.statusbar{
    position:absolute;
    top:18px;
    left:40px;
    right:40px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:14px;

    opacity:0.9;

    z-index:50;
}

.statusbar span{
    color:#ffffff;

    text-shadow:
    0 0 8px rgba(255,255,255,0.55);

    letter-spacing:1px;
}

.battery{
    margin-right:1px;
}

/* PAGE DECRYPT */

#decryptPage{
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
}

.main-title{
    font-size:58px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:10px;

    text-shadow:
    0 0 25px rgba(255,255,255,0.1);
}

.sub-status{
    font-size:20px;
    opacity:0.7;
    margin-bottom:50px;
    letter-spacing:3px;
}

/* BOUTONS */

.decrypt-btn,
button{
    padding:18px 42px;

    border:none;

    border-radius:22px;

    background:
    linear-gradient(to right,#5c6cff,#7b61ff);

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
    0 0 25px rgba(123,97,255,0.3);
}

.decrypt-btn{
    font-size:18px;
    padding:20px 42px;
}

.decrypt-btn:hover,
button:hover{
    transform:scale(1.04);

    box-shadow:
    0 0 35px rgba(123,97,255,0.5);
}

/* LOGIN */

#loginPage{
    display:none;
    width:100%;
    height:100%;
}

.login{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    width:360px;

    display:flex;
    flex-direction:column;

    gap:18px;
}

.login h1{
    text-align:center;
    margin-bottom:15px;

    font-size:38px;
    font-weight:600;
}

input{
    padding:18px;

    border:none;
    border-radius:20px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    color:white;

    font-size:16px;

    outline:none;

    border:1px solid rgba(255,255,255,0.06);
}

input::placeholder{
    color:rgba(255,255,255,0.5);
}

/* INTERFACE */

#interface{
    display:none;

    width:100%;
    height:100%;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;
}

.secret-title{
    font-size:72px;
    font-weight:700;
    margin-bottom:20px;
}

.secret-code{
    font-size:120px;
    font-weight:800;
    letter-spacing:8px;

    background:
    linear-gradient(to right,#ffffff,#c9c9ff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 40px rgba(124,97,255,0.35);
}

/* BARRE BAS */

.homebar{
    position:absolute;

    bottom:12px;
    left:50%;

    transform:translateX(-50%);

    width:220px;
    height:7px;

    border-radius:20px;

    background:#ffffff;

    z-index:100;

    box-shadow:
    0 0 10px rgba(255,255,255,0.45);
}

</style>
</head>

<body>

<audio id="buttonSound" src="sound.mp3"></audio>

<div class="tablette">

    <div class="camera"></div>

    <div class="statusbar">
        <span id="time">00:00</span>
        <span class="battery">100%</span>
    </div>

    <div class="screen">

        <div id="decryptPage">

            <div class="main-title">
                BLACK MARKET NODE
            </div>

            <div class="sub-status">
                STATUS: ENCRYPTED
            </div>

            <button class="decrypt-btn" onclick="openLogin()">
                Décrypter
            </button>

        </div>

        <div id="loginPage">

            <div id="loginBox" class="login">

                <h1>Connexion</h1>

                <input type="text" id="username" placeholder="Username">

                <input type="password" id="password" placeholder="Mot de passe">

                <button onclick="login()">
                    Se connecter
                </button>

            </div>

        </div>

        <div id="interface">

            <div class="secret-title">
                Code secret
            </div>

            <div class="secret-code">
                Skytrax
            </div>

        </div>

    </div>

    <div class="homebar"></div>

</div>

<script>

/* COMPTES */

const comptes = {
    "admin":"1234",
    "lspd":"police",
    "staff":"azerty"
};

/* SON */

function playSound(){

    const sound =
    document.getElementById("buttonSound");

    sound.volume = 0.1;
    sound.currentTime = 0;
    sound.play();

}

/* HEURE RÉELLE */

function updateTime(){

    const now = new Date();

    const hours =
    now.getHours().toString().padStart(2,"0");

    const minutes =
    now.getMinutes().toString().padStart(2,"0");

    document.getElementById("time").innerText =
    `${hours}:${minutes}`;

}

updateTime();
setInterval(updateTime, 1000);

/* PAGE LOGIN */

function openLogin(){

    playSound();

    setTimeout(() => {

        document.getElementById("decryptPage")
        .style.display = "none";

        document.getElementById("loginPage")
        .style.display = "block";

    }, 250);

}

/* LOGIN */

function login(){

    playSound();

    const user =
    document.getElementById("username").value;

    const pass =
    document.getElementById("password").value;

    if(comptes[user] && comptes[user] === pass){

        setTimeout(() => {

            document.getElementById("loginPage")
            .style.display = "none";

            document.getElementById("interface")
            .style.display = "flex";

        }, 250);

    }else{

        setTimeout(() => {

            alert("Identifiants incorrects");

        }, 150);

    }

}

</script>

</body>
</html>
